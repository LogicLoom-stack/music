<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience Pro - Digital Remix Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #09090b; 
            color: white;
            min-height: 100vh;
            /* Enabled scrolling for the whole page */
            overflow-y: auto; 
        }

        /* Glassmorphism Header - Pinned to top */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 20px; }
        
        /* Key animation */
        .key-active { 
            background: #4f46e5 !important; 
            border-color: white !important; 
            transform: translateY(4px) scale(0.98); 
            box-shadow: 0 0 25px rgba(79, 70, 229, 0.6); 
        }

        /* Smooth scroll behavior */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="pb-10">

    <!-- HEADER: PINNED -->
    <header class="p-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M9 18V5l12-2v13M9 18a3 3 0 11-6 0 3 3 0 016 0zm12-2a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </div>
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter italic leading-none">Experience Pro</h1>
                <p class="text-[9px] uppercase tracking-widest text-indigo-400 font-black mt-1">Created by charukalia@</p>
            </div>
        </div>
        <div id="master-controls" class="hidden flex gap-3">
            <button onclick="toggleMasterRecord()" id="master-rec-btn" class="px-4 py-2 border-2 border-white/20 rounded-lg text-[10px] font-black uppercase hover:bg-white/5 transition-all">Master Record</button>
            <button onclick="clearAll()" class="px-4 py-2 border border-white/10 text-zinc-400 text-[10px] font-black uppercase rounded-lg hover:bg-red-950 transition-all">Clear All</button>
        </div>
    </header>

    <!-- SPLASH SCREEN -->
    <main id="splash" class="h-[80vh] flex flex-col items-center justify-center">
        <div class="relative group cursor-pointer" onclick="initAudio()">
            <div class="absolute inset-0 bg-indigo-500 blur-[120px] opacity-20 animate-pulse"></div>
            <p class="text-7xl font-black tracking-[0.3em] uppercase relative z-10 italic">Studio</p>
        </div>
        <button onclick="initAudio()" class="mt-8 bg-indigo-600 px-10 py-4 rounded-full font-black hover:bg-indigo-500 transition-all shadow-2xl text-xs tracking-[0.2em] uppercase">Initialize Master Studio</button>
    </main>

    <!-- STUDIO INTERFACE -->
    <main id="studio" class="hidden container mx-auto px-4 mt-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- SIDEBAR: LAYERS (Sticky so it stays while you scroll instruments) -->
            <aside class="lg:col-span-3">
                <div class="sticky top-24 space-y-4">
                    <h4 class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em] px-2">Multitrack Layers</h4>
                    <div id="layers-container" class="space-y-3"></div>
                    <div class="p-4 bg-zinc-900/50 rounded-2xl border border-white/5 text-[9px] text-zinc-500 uppercase tracking-widest leading-relaxed">
                        Tip: Select a layer, hit record, and play keys to build your loop.
                    </div>
                </div>
            </aside>

            <!-- MAIN RACK -->
            <section class="lg:col-span-9 space-y-8">
                
                <!-- MONITOR -->
                <div class="h-32 bg-gradient-to-br from-zinc-900 to-black rounded-[2.5rem] border border-white/10 flex items-center justify-center relative shadow-2xl overflow-hidden">
                    <div id="note-display" class="text-7xl font-black text-white uppercase tracking-tighter drop-shadow-[0_0_30px_rgba(99,102,241,0.6)] z-10 italic">READY</div>
                    <div id="rec-indicator" class="hidden absolute bottom-5 right-10 flex items-center gap-3 text-red-500 text-[10px] font-black uppercase tracking-[0.2em] animate-pulse">
                        <div class="w-3 h-3 bg-red-500 rounded-full shadow-[0_0_10px_red]"></div> RECORDING MASTER
                    </div>
                </div>

                <!-- INSTRUMENT RACK -->
                <div class="space-y-8">
                    <!-- BASS -->
                    <div class="bg-zinc-900/40 p-8 rounded-[3rem] border border-white/5 shadow-xl">
                        <h4 class="text-[11px] font-black text-blue-400 uppercase tracking-[0.3em] mb-6">Bass Foundation <span class="text-zinc-600 ml-4 font-normal">[1 - 7]</span></h4>
                        <div class="flex flex-wrap justify-center gap-4" id="bass-pads"></div>
                    </div>

                    <!-- PIANO -->
                    <div class="bg-zinc-900/40 p-8 rounded-[3rem] border border-white/5 shadow-xl">
                        <h4 class="text-[11px] font-black text-indigo-400 uppercase tracking-[0.3em] mb-6">Grand Piano <span class="text-zinc-600 ml-4 font-normal">[A - ']</span></h4>
                        <div class="flex justify-start lg:justify-center gap-1.5 py-4 overflow-x-auto custom-scrollbar" id="piano-keys"></div>
                    </div>

                    <!-- DRUMS -->
                    <div class="bg-zinc-900/40 p-8 rounded-[3rem] border border-white/5 shadow-xl">
                        <h4 class="text-[11px] font-black text-zinc-500 uppercase tracking-[0.3em] mb-6">Percussion Pads <span class="text-zinc-600 ml-4 font-normal">[Z - M]</span></h4>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="drum-pads"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        const bassMap = { '1': 'C2', '2': 'D2', '3': 'E2', '4': 'F2', '5': 'G2', '6': 'A2', '7': 'B2' };
        const pianoMap = { 'a': 'C4', 'w': 'C#4', 's': 'D4', 'e': 'D#4', 'd': 'E4', 'f': 'F4', 't': 'F#4', 'g': 'G4', 'y': 'G#4', 'h': 'A4', 'u': 'A#4', 'j': 'B4', 'k': 'C5', 'o': 'C#5', 'l': 'D5', 'p': 'D#5', ';': 'E5', "'": 'F5' };
        const drumMap = { 'z': 'kick', 'x': 'snare', 'c': 'hat', 'v': 'tom', 'b': 'openHat', 'n': 'clap', 'm': 'rim' };

        let isLoaded = false;
        let selectedLayer = 0;
        let isRecording = null;
        let isMasterRecording = false;
        const recorders = [[], [], [], [], [], []];
        const loopParts = [null, null, null, null, null, null];
        const layerMeta = Array(6).fill().map(() => ({ volume: 0, speed: 1, length: 32, muted: false }));

        let masterRecorder, piano, bass, kick, snare, hat;

        async function initAudio() {
            await Tone.start();
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('studio').classList.remove('hidden');
            document.getElementById('master-controls').classList.remove('hidden');

            masterRecorder = new Tone.Recorder();
            const reverb = new Tone.Reverb({ decay: 4, wet: 0.3 }).toDestination();
            const masterVol = new Tone.Volume(-6).connect(reverb);
            Tone.getDestination().connect(masterRecorder);

            // INSTRUMENTS
            piano = new Tone.Sampler({
                urls: { "C4": "https://tonejs.github.io/audio/salamander/C4.mp3" },
                release: 1
            }).connect(masterVol);

            bass = new Tone.MonoSynth({ oscillator: { type: "triangle" } }).connect(masterVol);
            kick = new Tone.MembraneSynth().connect(masterVol);
            snare = new Tone.NoiseSynth().connect(masterVol);
            hat = new Tone.MetalSynth().connect(masterVol);

            renderUI();
            setupKeyboard();
            Tone.Transport.start();
            isLoaded = true;
        }

        function playSound(key) {
            const time = Tone.now();
            if (bassMap[key]) bass.triggerAttackRelease(bassMap[key], "8n", time);
            if (pianoMap[key]) piano.triggerAttackRelease(pianoMap[key], "4n", time);
            if (drumMap[key]) {
                if (key === 'z') kick.triggerAttackRelease("C1", "8n", time);
                if (key === 'x') snare.triggerAttack(time);
                if (key === 'c') hat.triggerAttackRelease("16n", time);
                if (key === 'v') kick.triggerAttackRelease("G1", "8n", time);
            }
            document.getElementById('note-display').innerText = key.toUpperCase();
            if (isRecording !== null) {
                recorders[isRecording].push({ time: Tone.Transport.seconds, key });
            }
        }

        function toggleRecord(idx) {
            if (isRecording === idx) {
                isRecording = null;
                startLoop(idx);
            } else {
                isRecording = idx;
                recorders[idx] = [];
            }
            renderUI();
        }

        function startLoop(idx) {
            if (loopParts[idx]) loopParts[idx].dispose();
            if (recorders[idx].length === 0) return;
            const startTime = recorders[idx][0].time;
            const events = recorders[idx].map(e => ({ ...e, time: e.time - startTime }));
            loopParts[idx] = new Tone.Part((time, event) => {
                playSound(event.key);
            }, events).start(0);
            loopParts[idx].loop = true;
            loopParts[idx].loopEnd = "2m";
        }

        function renderUI() {
            const container = document.getElementById('layers-container');
            container.innerHTML = layerMeta.map((m, i) => `
                <div onclick="selectedLayer=${i}; renderUI()" class="p-4 rounded-2xl border-2 cursor-pointer transition-all ${selectedLayer === i ? 'border-indigo-500 bg-indigo-900/40' : 'bg-zinc-900 border-transparent'}">
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-black italic">LAYER ${i+1}</span>
                        <button onclick="event.stopPropagation(); toggleRecord(${i})" class="px-4 py-1.5 rounded-lg text-[10px] font-bold ${isRecording === i ? 'bg-red-600 animate-pulse' : 'bg-zinc-800'}">REC</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('bass-pads').innerHTML = Object.keys(bassMap).map(k => `
                <div id="key-${k}" class="h-16 w-20 bg-zinc-900 border border-blue-900/30 rounded-2xl flex items-center justify-center text-lg font-bold text-blue-400">${k}</div>
            `).join('');

            document.getElementById('piano-keys').innerHTML = Object.keys(pianoMap).map(k => `
                <div id="key-${k}" class="h-40 w-12 bg-white text-black rounded-xl flex items-end justify-center pb-4 font-bold text-[11px] shrink-0 shadow-lg">${k.toUpperCase()}</div>
            `).join('');

            document.getElementById('drum-pads').innerHTML = Object.keys(drumMap).map(k => `
                <div id="key-${k}" class="h-20 bg-zinc-900 border border-white/5 rounded-[1.5rem] flex items-center justify-center text-xs font-black uppercase italic tracking-widest text-zinc-500">${drumMap[k]}</div>
            `).join('');
        }

        function setupKeyboard() {
            window.addEventListener('keydown', (e) => {
                if (!isLoaded) return;
                const key = e.key.toLowerCase();
                const el = document.getElementById(`key-${key}`);
                if (el) { el.classList.add('key-active'); playSound(key); }
            });
            window.addEventListener('keyup', (e) => {
                const el = document.getElementById(`key-${e.key.toLowerCase()}`);
                if (el) el.classList.remove('key-active');
            });
        }

        async function toggleMasterRecord() {
            const btn = document.getElementById('master-rec-btn');
            const ind = document.getElementById('rec-indicator');
            if (!isMasterRecording) {
                masterRecorder.start();
                isMasterRecording = true;
                btn.innerText = "STOP & SAVE";
                btn.classList.add('bg-red-600', 'border-red-500');
                ind.classList.remove('hidden');
            } else {
                const blob = await masterRecorder.stop();
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = "studio-session.webm"; a.click();
                isMasterRecording = false;
                btn.innerText = "MASTER RECORD";
                btn.classList.remove('bg-red-600', 'border-red-500');
                ind.classList.add('hidden');
            }
        }

        function clearAll() {
            recorders.forEach((r, i) => { recorders[i] = []; if(loopParts[i]) loopParts[i].dispose(); });
            renderUI();
        }
    </script>
</body>
</html>
